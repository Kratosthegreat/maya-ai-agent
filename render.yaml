services:

- type: web
  name: maya-ai-agent
  env: python
  repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME
  buildCommand: pip install -r requirements.txt
  startCommand: python main.py
  plan: free
  region: oregon
  branch: main
  healthCheckPath: /health
  envVars:
  - key: TELEGRAM_BOT_TOKEN
    sync: false
  - key: GEMINI_API_KEY
    sync: false
  - key: PYTHON_VERSION
    value: 3.11.0
  - key: ENVIRONMENT
    value: production
    disk:
    name: maya-storage
    mountPath: /opt/render/project/storage
    sizeGB: 1